<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Seneschal — Design Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: 'DM Sans', sans-serif; }
</style>

<body>
<div id="root"></div>
<script type="text/babel">



// ─── SHARED SAMPLE DATA ──────────────────────────────────────────────────────
const creatures = [
{ name: 'Adept', size: 'Medium', traits: ['human', 'humanoid'], level: -1, rarity: 'common', source: 'NPC Core' },
{ name: 'Animated Broom', size: 'Small', traits: ['construct', 'mindless'], level: -1, rarity: 'common', source: 'Monster Core' },
{ name: 'Apothecary', size: 'Medium', traits: ['human', 'humanoid'], level: -1, rarity: 'common', source: 'NPC Core' },
{ name: 'Apprentice', size: 'Medium', traits: ['human', 'humanoid'], level: -1, rarity: 'common', source: 'NPC Core' },
{ name: 'Barrister', size: 'Medium', traits: ['human', 'humanoid'], level: -1, rarity: 'common', source: 'NPC Core' },
{ name: 'Clockwork Spy', size: 'Tiny', traits: ['clockwork', 'construct', 'mindless'], level: 0, rarity: 'uncommon', source: 'Monster Core' },
{ name: 'Commoner', size: 'Medium', traits: ['human', 'humanoid'], level: -1, rarity: 'common', source: 'NPC Core' },
{ name: 'Compsognathus', size: 'Tiny', traits: ['animal', 'dinosaur'], level: -1, rarity: 'common', source: 'Monster Core' }];


const statblock = {
  name: 'Adept', type: 'Creature -1',
  traits: ['MEDIUM', 'HUMAN', 'HUMANOID'],
  source: 'Pathfinder NPC Core',
  perception: '+4', languages: 'common',
  skills: 'Arcana +5, Diplomacy +3, Occultism +5, Society +5',
  abilities: 'Str +0, Dex +2, Con +0, Int +3, Wis +2, Cha +1',
  ac: 14, fort: '+2', ref: '+4', will: '+6', hp: 8, speed: '25 ft.',
  melee: '◆ Fist +6 [+2/−2] (agile, nonlethal, unarmed), Damage 1d4 bludgeoning',
  ranged: '◆ Journal +6 [+1/−1] (nonlethal, thrown-10), Damage 1d6 bludgeoning',
  action: { name: 'Focused Thinker', cost: '◆', trait: 'concentrate', desc: 'The adept concentrates to muster knowledge. They gain a +2 status bonus to Recall Knowledge checks, but take a −2 status penalty to Perception. They can Dismiss this focused state.' }
};

// ─── VARIATION A: MODERNIZED PARCHMENT (revised) ─────────────────────────────
// Compact top-strip nav, dedicated encounter panel, full-height filter sidebar.

const A_TRAIT_BG = { human: '#c4a882', humanoid: '#b89a72', construct: '#7a6a5a', mindless: '#8a5a4a', uncommon: '#9a6a2a', animal: '#5a7a4a', dinosaur: '#4a6a5a', clockwork: '#4a5a7a' };

const VariantA = () => {
  const [filtersOpen, setFiltersOpen] = React.useState(true);
  const bg = '#f4ead6';
  const parchment = '#faf4e8';
  const crimson = '#5c1414';
  const crimsonH = '#7a1c1c';
  const gold = '#9a7228';
  const border = '#d8c8a4';
  const borderL = '#ecddc4';
  const text = '#2a1a0e';
  const textMid = '#5a3a20';
  const textMute = '#8a6a4a';

  const Chip = ({ label, color }) =>
  <span style={{ display: 'inline-block', padding: '1px 6px', borderRadius: 3,
    fontSize: 10, fontWeight: 700, letterSpacing: '0.04em', textTransform: 'uppercase',
    background: color || '#c4a882', color: '#fff', lineHeight: '17px' }}>{label}</span>;


  const Row = ({ c, active }) =>
  <div style={{ padding: '8px 12px', display: 'flex', alignItems: 'flex-start', gap: 8, cursor: 'pointer',
    background: active ? `${crimson}12` : 'transparent',
    borderLeft: `3px solid ${active ? crimson : 'transparent'}`,
    borderBottom: `1px solid ${borderL}` }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
          <span style={{ fontSize: 13, fontWeight: 600, color: active ? crimson : text, fontFamily: 'Cinzel,serif' }}>{c.name}</span>
          {c.rarity !== 'common' && <Chip label={c.rarity} color='#9a6a2a' />}
        </div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 3, marginTop: 3 }}>
          <span style={{ fontSize: 11, color: textMute }}>{c.size}</span>
          {c.traits.map((tr) => <Chip key={tr} label={tr} color={A_TRAIT_BG[tr] || '#8a7a60'} />)}
        </div>
      </div>
      <div style={{ flexShrink: 0, background: active ? crimson : borderL, color: active ? '#fff' : textMid,
      borderRadius: 4, padding: '2px 7px', fontSize: 11, fontWeight: 700, fontFamily: 'DM Mono,monospace', marginTop: 1 }}>
        {c.level >= 0 ? `+${c.level}` : c.level}
      </div>
    </div>;


  const encounterCreatures = [
  { name: 'Goblin Warrior', level: 1, count: 3, xp: 30 },
  { name: 'Goblin Warchanter', level: 2, count: 1, xp: 60 }];

  const totalXP = 150;const budget = 'Moderate';
  const budgetColor = '#6a7a18';

  return (
    <div style={{ width: 1280, height: 780, display: 'flex', fontFamily: "'DM Sans', sans-serif", background: bg, overflow: 'hidden', fontSize: 13, color: text }}>

      {/* ── Left section: top bar + filters + results ── */}
      <div style={{ display: 'flex', flexDirection: 'column', flexShrink: 0 }}>

        {/* Top bar — only over left two columns */}
        <div style={{ height: 46, background: crimson, display: 'flex', alignItems: 'center', paddingLeft: 16, paddingRight: 16, gap: 12, flexShrink: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 26, height: 26, borderRadius: 5, background: 'rgba(240,230,204,0.15)', border: '1px solid rgba(240,230,204,0.25)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <span style={{ fontFamily: 'Cinzel,serif', fontSize: 13, fontWeight: 700, color: '#f0e6cc' }}>S</span>
            </div>
            <span style={{ fontFamily: 'Cinzel,serif', fontSize: 15, fontWeight: 700, color: '#f0e6cc', letterSpacing: '0.04em' }}>Seneschal</span>
          </div>
          <div style={{ width: 1, height: 20, background: 'rgba(240,230,204,0.2)' }}></div>
          <div style={{ display: 'flex', gap: 2 }}>
            {[['⚔', 'GM Assistant', true], ['📖', 'Rules', false], ['✦', 'Characters', false]].map(([icon, label, active]) =>
            <div key={label} style={{ display: 'flex', alignItems: 'center', gap: 4, padding: '4px 10px', borderRadius: 5, cursor: 'pointer',
              background: active ? 'rgba(240,230,204,0.18)' : 'transparent',
              border: `1px solid ${active ? 'rgba(240,230,204,0.28)' : 'transparent'}` }}>
                <span style={{ fontSize: 12 }}>{icon}</span>
                <span style={{ fontSize: 12, fontWeight: active ? 600 : 400, color: active ? '#f0e6cc' : 'rgba(240,230,204,0.55)' }}>{label}</span>
              </div>
            )}
          </div>
        </div>

        {/* Col 1 + Col 2 side by side */}
        <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>

        {/* Col 1: Filters */}
        <div style={{ width: filtersOpen ? 212 : 0, borderRight: filtersOpen ? `1px solid ${border}` : 'none', display: 'flex', flexDirection: 'column', background: parchment, flexShrink: 0, overflow: 'hidden', transition: 'width 0.2s' }}>
          <div style={{ padding: '10px 12px 8px', borderBottom: `1px solid ${border}` }}>
            <div style={{ fontSize: 10, color: textMute, letterSpacing: '0.1em', textTransform: 'uppercase', fontWeight: 600, marginBottom: 7 }}>Creature Search</div>
            <div style={{ background: bg, border: `1px solid ${border}`, borderRadius: 5, padding: '6px 9px', display: 'flex', gap: 5 }}>
              <span style={{ color: textMute, fontSize: 13 }}>⌕</span>
              <span style={{ fontSize: 12, color: textMute }}>Search by name…</span>
            </div>
          </div>
          <div style={{ flex: 1, padding: '10px 12px', overflowY: 'auto' }}>
            {/* Level */}
            <div style={{ marginBottom: 10 }}>
              <div style={{ fontSize: 10, color: textMute, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600, marginBottom: 5 }}>Level Range</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                <div style={{ flex: 1, background: bg, border: `1px solid ${border}`, borderRadius: 4, padding: '4px 6px', fontSize: 11, color: textMid, textAlign: 'center' }}>−1</div>
                <span style={{ color: textMute, fontSize: 11 }}>—</span>
                <div style={{ flex: 1, background: bg, border: `1px solid ${border}`, borderRadius: 4, padding: '4px 6px', fontSize: 11, color: textMid, textAlign: 'center' }}>25</div>
              </div>
            </div>
            {/* Traits */}
            <div style={{ marginBottom: 10 }}>
              <div style={{ fontSize: 10, color: textMute, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600, marginBottom: 5 }}>Traits</div>
              <div style={{ background: bg, border: `1px solid ${border}`, borderRadius: 5, padding: '5px 8px', fontSize: 11, color: textMute }}>Add trait…</div>
            </div>
            {/* Size */}
            <div style={{ marginBottom: 10 }}>
              <div style={{ fontSize: 10, color: textMute, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600, marginBottom: 5 }}>Size</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4 }}>
                {['Tiny', 'Small', 'Medium', 'Large', 'Huge', 'Gargan.'].map((s, i) =>
                  <div key={s} style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 11, color: i === 2 ? text : textMute }}>
                    <div style={{ width: 11, height: 11, borderRadius: 2, border: `1px solid ${i === 2 ? gold : border}`, background: i === 2 ? gold : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 8, color: '#fff', flexShrink: 0 }}>{i === 2 ? '✓' : ''}</div>
                    {s}
                  </div>
                  )}
              </div>
            </div>
            {/* Rarity */}
            <div style={{ marginBottom: 10 }}>
              <div style={{ fontSize: 10, color: textMute, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600, marginBottom: 5 }}>Rarity</div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
                {['Common', 'Uncommon', 'Rare', 'Unique'].map((r, i) =>
                  <div key={r} style={{ padding: '2px 7px', borderRadius: 4, fontSize: 10, fontWeight: 600,
                    background: i === 0 ? crimson : bg, color: i === 0 ? '#f0e6cc' : textMute,
                    border: `1px solid ${i === 0 ? crimson : border}` }}>{r}</div>
                  )}
              </div>
            </div>
            {/* Source tree */}
            <div>
              <div style={{ fontSize: 10, color: textMute, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600, marginBottom: 5 }}>Source</div>
              {['▾ Remaster', '  ▾ Core', '    ✓ Monster Core', '    ✓ NPC Core', '  ▸ Supplemental', '▸ Legacy'].map((l, i) =>
                <div key={i} style={{ padding: '3px 0', fontSize: 11, color: l.includes('✓') ? text : textMute, borderBottom: `1px solid ${borderL}` }}>{l}</div>
                )}
            </div>
          </div>
        </div>

        {/* Col 2: Results list */}
        <div style={{ width: 268, borderRight: `1px solid ${border}`, display: 'flex', flexDirection: 'column', background: parchment, flexShrink: 0 }}>
          <div style={{ padding: '8px 12px', borderBottom: `1px solid ${border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <button onClick={() => setFiltersOpen(o => !o)} style={{ width: 22, height: 22, borderRadius: 4, background: parchment, border: `1px solid ${border}`, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: textMute, fontSize: 11, flexShrink: 0 }}>
                {filtersOpen ? '‹‹' : '››'}
              </button>
              <span style={{ fontSize: 11, fontWeight: 600, color: textMute, letterSpacing: '0.05em' }}>1,818 RESULTS</span>
            </div>
            <div style={{ display: 'flex', gap: 3 }}>
              {['Level', 'Name'].map((s, i) =>
                <div key={s} style={{ padding: '2px 8px', borderRadius: 4, fontSize: 10, fontWeight: 700,
                  background: i === 0 ? crimson : 'transparent', color: i === 0 ? '#f0e6cc' : textMute,
                  border: `1px solid ${i === 0 ? crimson : border}` }}>{s}</div>
                )}
            </div>
          </div>
          <div style={{ flex: 1, overflowY: 'auto' }}>
            {creatures.map((c, i) => <Row key={c.name} c={c} active={i === 0} />)}
          </div>
        </div>

        </div>{/* end Col1+Col2 inner flex */}
      </div>{/* end left section */}

        {/* Col 3: Encounter manager */}
        <div style={{ width: 268, borderRight: `1px solid ${border}`, display: 'flex', flexDirection: 'column', background: bg, flexShrink: 0 }}>
          {/* Header with encounter tabs */}
          <div style={{ padding: '0 12px', borderBottom: `1px solid ${border}`, display: 'flex', alignItems: 'stretch', gap: 0 }}>
            {['Ruins Crawl', 'Forest Ambush'].map((enc, i) =>
          <div key={enc} style={{ padding: '8px 10px', fontSize: 11, fontWeight: i === 0 ? 700 : 400,
            color: i === 0 ? crimson : textMute,
            borderBottom: i === 0 ? `2px solid ${crimson}` : '2px solid transparent',
            cursor: 'pointer', whiteSpace: 'nowrap' }}>{enc}</div>
          )}
            <div style={{ padding: '8px 6px', fontSize: 14, color: textMute, cursor: 'pointer', marginLeft: 'auto', alignSelf: 'center' }}>＋</div>
          </div>

          {/* XP budget */}
          <div style={{ padding: '10px 12px', borderBottom: `1px solid ${border}`, background: parchment }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 5 }}>
              <span style={{ fontSize: 10, color: textMute, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600 }}>Encounter Budget</span>
              <span style={{ fontSize: 12, fontWeight: 700, color: budgetColor }}>{budget}</span>
            </div>
            <div style={{ height: 5, borderRadius: 3, background: borderL, overflow: 'hidden', marginBottom: 4 }}>
              <div style={{ height: '100%', borderRadius: 3, background: budgetColor, width: '52%' }}></div>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, color: textMute }}>
              <span>Party: 4 × Lvl 3</span>
              <span style={{ fontWeight: 600, color: textMid }}>{totalXP} / 80 XP</span>
            </div>
            <div style={{ display: 'flex', gap: 4, marginTop: 5 }}>
              {[['Low', '#4a7a18', 40], ['Mod', '#6a7a18', 60], ['Sev', '#8a5a18', 90], ['Ext', '#8a2a18', 160]].map(([l, c2, v]) =>
            <div key={l} style={{ flex: 1, textAlign: 'center', padding: '2px 0', borderRadius: 3, fontSize: 9, fontWeight: 700,
              background: totalXP >= v ? c2 : borderL, color: totalXP >= v ? '#fff' : textMute }}>{l}</div>
            )}
            </div>
          </div>

          {/* Party */}
          <div style={{ padding: '6px 12px', borderBottom: `1px solid ${borderL}`, display: 'flex', alignItems: 'center', gap: 6 }}>
            <span style={{ fontSize: 10, color: textMute, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.08em', flexShrink: 0 }}>Party</span>
            <div style={{ display: 'flex', alignItems: 'center', gap: 3, marginLeft: 4 }}>
              <span style={{ fontSize: 13, color: textMute, cursor: 'pointer', lineHeight: 1 }}>−</span>
              <span style={{ fontSize: 12, fontWeight: 700, color: text, width: 14, textAlign: 'center' }}>4</span>
              <span style={{ fontSize: 13, color: textMute, cursor: 'pointer', lineHeight: 1 }}>+</span>
            </div>
            <span style={{ fontSize: 11, color: textMute }}>players · Lvl</span>
            <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}>
              <span style={{ fontSize: 13, color: textMute, cursor: 'pointer', lineHeight: 1 }}>−</span>
              <span style={{ fontSize: 12, fontWeight: 700, color: text, width: 14, textAlign: 'center' }}>3</span>
              <span style={{ fontSize: 13, color: textMute, cursor: 'pointer', lineHeight: 1 }}>+</span>
            </div>
          </div>

          {/* Creatures in encounter — each individual with init + HP */}
          <div style={{ flex: 1, overflowY: 'auto', padding: '8px 12px' }}>
            <div style={{ fontSize: 10, color: textMute, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600, marginBottom: 6 }}>Creatures</div>
            {[
          { name: 'Goblin Warrior', label: 'GW 1', level: 1, init: 18, hp: 12, maxHp: 12, active: true },
          { name: 'Goblin Warrior', label: 'GW 2', level: 1, init: 14, hp: 8, maxHp: 12 },
          { name: 'Goblin Warrior', label: 'GW 3', level: 1, init: 11, hp: 12, maxHp: 12 },
          { name: 'Goblin Warchanter', label: 'Warchanter', level: 2, init: 16, hp: 24, maxHp: 26 }].
          map((ec, i) => {
            const hpPct = ec.hp / ec.maxHp;
            const hpColor = hpPct > 0.5 ? '#3a7a3a' : hpPct > 0.25 ? '#8a6a18' : '#8a2a18';
            return (
              <div key={i} style={{ background: ec.active ? `${crimson}0e` : parchment, border: `1px solid ${ec.active ? crimson : border}`, borderRadius: 6, padding: '7px 9px', marginBottom: 5 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
                    <div style={{ width: 24, height: 24, borderRadius: 4, background: ec.active ? crimson : bg, border: `1px solid ${ec.active ? crimson : border}`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                      <span style={{ fontSize: 10, fontWeight: 700, color: ec.active ? '#f0e6cc' : textMid, fontFamily: 'DM Mono,monospace' }}>{ec.init}</span>
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: ec.active ? crimson : text, lineHeight: 1 }}>{ec.label}</div>
                      <div style={{ fontSize: 10, color: textMute }}>{ec.name} · Lvl {ec.level}</div>
                    </div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: hpColor, fontFamily: 'DM Mono,monospace', flexShrink: 0 }}>{ec.hp}/{ec.maxHp}</div>
                  </div>
                  <div style={{ height: 3, borderRadius: 2, background: borderL, overflow: 'hidden' }}>
                    <div style={{ height: '100%', borderRadius: 2, background: hpColor, width: `${hpPct * 100}%` }}></div>
                  </div>
                </div>);

          })}
            {/* Custom creature */}
            <div style={{ border: `1px dashed ${border}`, borderRadius: 6, padding: '7px 10px', display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer' }}>
              <span style={{ fontSize: 14, color: textMute }}>＋</span>
              <span style={{ fontSize: 11, color: textMute }}>Add placeholder…</span>
            </div>
            {/* Start combat button */}
            <div style={{ marginTop: 10, background: crimson, borderRadius: 6, padding: '8px 0', textAlign: 'center', cursor: 'pointer' }}>
              <span style={{ fontSize: 12, fontWeight: 700, color: '#f0e6cc', letterSpacing: '0.04em' }}>▶ Start Combat</span>
            </div>
          </div>
        </div>

        {/* Col 4: Statblock */}
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: parchment }}>
          <div style={{ background: '#7a5c2e', padding: '12px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
            <div>
              <div style={{ fontFamily: 'Cinzel,serif', fontSize: 18, fontWeight: 700, color: '#fff' }}>{statblock.name}</div>
              <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.55)', marginTop: 1 }}>{statblock.type}</div>
            </div>
            <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
              {statblock.traits.map((tr) =>
            <span key={tr} style={{ padding: '1px 7px', borderRadius: 3, fontSize: 9, fontWeight: 700, letterSpacing: '0.05em', textTransform: 'uppercase', background: 'rgba(0,0,0,0.25)', color: 'rgba(255,255,255,0.9)' }}>{tr}</span>
            )}
              <span style={{ fontSize: 12, color: 'rgba(255,255,255,0.4)', marginLeft: 6 }}>✕</span>
            </div>
          </div>
          <div style={{ flex: 1, overflowY: 'auto', padding: '12px 16px' }}>
            <div style={{ fontSize: 11, color: textMute, marginBottom: 6 }}>Source <em style={{ color: textMid }}>{statblock.source}</em></div>
            <div style={{ height: 1, background: border, margin: '7px 0' }}></div>
            {[['Perception', statblock.perception], ['Languages', statblock.languages], ['Skills', statblock.skills]].map(([k, v]) =>
          <div key={k} style={{ marginBottom: 4, fontSize: 12 }}>
                <strong style={{ color: text }}>{k} </strong><span style={{ color: textMid }}>{v}</span>
              </div>
          )}
            <div style={{ fontSize: 12, color: textMid, marginBottom: 7 }}>{statblock.abilities}</div>
            <div style={{ height: 1, background: border, margin: '7px 0' }}></div>
            <div style={{ display: 'flex', gap: 12, marginBottom: 5 }}>
              {[['AC', statblock.ac], ['Fort', statblock.fort], ['Ref', statblock.ref], ['Will', statblock.will]].map(([k, v]) =>
            <span key={k} style={{ fontSize: 12 }}><strong style={{ color: text }}>{k} </strong><span style={{ color: textMid }}>{v}</span></span>
            )}
            </div>
            <div style={{ fontSize: 12, color: textMid, marginBottom: 7 }}><strong style={{ color: text }}>HP </strong>{statblock.hp} &nbsp;<strong style={{ color: text }}>Speed </strong>{statblock.speed}</div>
            <div style={{ height: 1, background: border, margin: '7px 0' }}></div>

            <span key={k} style={{ fontSize: 13 }}><strong style={{ color: text, fontWeight: 700 }}>{k} </strong><span style={{ color: textMid }}>{v}</span></span>
            )}
          </div>
          <div style={{ fontSize: 13, marginBottom: 8, color: textMid }}><strong style={{ color: text }}>HP </strong><span style={{ fontWeight: 700, color: text }}>{statblock.hp}</span>  <strong style={{ color: text }}>Speed </strong>{statblock.speed}</div>
          <div style={{ height: 1, background: `linear-gradient(90deg, ${borderDark}, transparent)`, marginBottom: 8 }}></div>
          <div style={{ fontSize: 13, marginBottom: 4, color: textMid }}><strong style={{ color: text }}>Melee </strong>{statblock.melee}</div>
          <div style={{ fontSize: 13, marginBottom: 12, color: textMid }}><strong style={{ color: text }}>Ranged </strong>{statblock.ranged}</div>
          <div style={{ background: parchment, border: `1px solid ${borderDark}`, borderTop: `3px solid ${crimson}`, borderRadius: 6, padding: '10px 14px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 5 }}>
              <span style={{ fontFamily: 'Cinzel,serif', fontSize: 13, fontWeight: 700, color: crimson }}>{statblock.action.name}</span>
              <span style={{ color: crimson, fontSize: 14, fontWeight: 700 }}>{statblock.action.cost}</span>
              <span style={{ padding: '0 7px', background: crimson, color: '#f8ede0', borderRadius: 3, fontSize: 10, fontWeight: 700, textTransform: 'uppercase' }}>{statblock.action.trait}</span>
            </div>
            <div style={{ fontSize: 12, color: textMid, lineHeight: 1.7 }}>{statblock.action.desc}</div>
          </div>
        </div>
      </div>
    </div>);

};

<DesignCanvas title="Seneschal — Design Directions">

</script>
